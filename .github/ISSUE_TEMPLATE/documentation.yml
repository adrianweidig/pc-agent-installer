name: Dokumentationshinweis / Documentation note
description: Unklare, fehlende oder widersprüchliche Dokumentation melden. Report unclear, missing, or conflicting documentation.
title: "[Docs] "
labels:
  - documentation
body:
  - type: textarea
    id: location
    attributes:
      label: Fundstelle / Location
      description: Welche Datei, Überschrift oder welcher Link ist betroffen? Which file, heading, or link is affected?
      placeholder: README.md, docs/05-secrets-policy.md, ...
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: Was ist unklar, falsch oder fehlt? What is unclear, wrong, or missing?
    validations:
      required: true
  - type: textarea
    id: suggestion
    attributes:
      label: Vorschlag / Suggestion
      description: Welche konkrete Verbesserung wäre hilfreich? Which concrete improvement would help?
  - type: checkboxes
    id: safety
    attributes:
      label: Sicherheitscheck / Safety check
      options:
        - label: Der Hinweis enthält keine Secrets, echten Hostnamen, privaten Pfade oder vertraulichen Infrastrukturdetails. The note contains no secrets, real host names, private paths, or confidential infrastructure details.
          required: true
