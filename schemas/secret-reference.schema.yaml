$schema: https://json-schema.org/draft/2020-12/schema
title: PC Agent Installer Secret References
type: object
required: [secrets]
properties:
  secrets:
    type: array
    items:
      type: object
      required: [id, purpose, value_stored_in_repo, storage_backend, agent_access]
      properties:
        id:
          type: string
        purpose:
          type: string
        value_stored_in_repo:
          type: boolean
          const: false
        storage_backend:
          type: string
        runtime_env_name:
          type: [string, 'null']
        agent_access:
          type: string
        rotation:
          type: [string, 'null']
additionalProperties: false
